<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>For My Queen 👑</title>
    
    <!-- AR Scripts -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-face-aframe.prod.js"></script>

    <style>
      body { 
        margin: 0; overflow: hidden; 
        font-family: 'Arial Rounded MT Bold', 'Comic Sans MS', sans-serif; 
        background-color: #000;
      }

      /* =========================================
         ✨ THE BEAUTIFUL FRAME DESIGN ✨
         ========================================= */
      #filter-frame {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        z-index: 1000;
        pointer-events: none; /* Lets the camera track her face through the UI */
        
        /* Soft pink glowing border (vignette) */
        box-shadow: inset 0 0 40px rgba(255, 105, 180, 0.5), 
                    inset 0 0 15px rgba(255, 182, 193, 0.7);
        border: 8px solid rgba(255, 182, 193, 0.3);
        border-radius: 15px;
        
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 20px;
        box-sizing: border-box;
      }

      /* Top Message */
      .top-banner {
        text-align: center;
        color: #fff;
        font-size: 26px;
        font-weight: bold;
        text-shadow: 2px 2px 4px rgba(255, 77, 121, 0.8), 0 0 10px rgba(255, 255, 255, 0.5);
        margin-top: 10px;
        animation: float 3s ease-in-out infinite;
      }

      /* Floating Corner Decorations */
      .decor {
        position: absolute;
        font-size: 35px;
        filter: drop-shadow(0px 0px 5px rgba(255,255,255,0.8));
      }
      .top-left { top: 20px; left: 20px; animation: pulse 2s infinite; }
      .top-right { top: 20px; right: 20px; animation: pulse 2.5s infinite; }
      .bottom-left { bottom: 100px; left: 20px; animation: pulse 2.2s infinite; }
      .bottom-right { bottom: 100px; right: 20px; animation: pulse 2.7s infinite; }

      /* Bottom Love Note */
      .bottom-banner {
        background: rgba(255, 255, 255, 0.85);
        color: #ff4d79;
        padding: 15px;
        border-radius: 20px;
        text-align: center;
        font-size: 18px;
        font-weight: bold;
        box-shadow: 0px 5px 15px rgba(0,0,0,0.1);
        margin-bottom: 20px;
        border: 2px solid #ffb3c6;
      }
      
      .instructions {
        font-size: 14px;
        color: #aaa;
        margin-top: 5px;
        font-weight: normal;
      }

      /* Animations */
      @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(10px); }
        100% { transform: translateY(0px); }
      }
      @keyframes pulse {
        0% { transform: scale(1); opacity: 0.8; }
        50% { transform: scale(1.1); opacity: 1; }
        100% { transform: scale(1); opacity: 0.8; }
      }

      /* Camera Flash Effect */
      #flash {
        position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
        background: white; z-index: 2000; opacity: 0; pointer-events: none;
        transition: opacity 0.5s ease-out;
      }
      
      /* Make the whole screen tappable for the flash */
      #tap-zone {
        position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
        z-index: 999;
      }
    </style>
  </head>
  <body>

    <!-- Invisible layer to detect screen taps for the flash -->
    <div id="tap-zone" onclick="triggerFlash()"></div>

    <!-- ✨ THE FRAME OVERLAY ✨ -->
    <div id="filter-frame">
      
      <div class="decor top-left">✨</div>
      <div class="decor top-right">💖</div>
      <div class="decor bottom-left">🍫</div>
      <div class="decor bottom-right">🌹</div>

      <!-- Top Text -->
      <div class="top-banner">The Prettiest Queen 👑</div>

      <!-- Bottom Text -->
      <div class="bottom-banner">
        Sending infinite hugs & tummy rubs! Feel better soon 💕
        <div class="instructions">Tap the screen, take a screenshot, and send it to me! 📸</div>
      </div>
    </div>

    <!-- The Flash Screen -->
    <div id="flash"></div>

    <!-- THE AR SCENE -->
    <a-scene mindar-face embedded color-space="sRGB" renderer="colorManagement: true" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      <a-camera active="false" position="0 0 0"></a-camera>
      
      <!-- Lighting to make the crown look pretty -->
      <a-light type="ambient" color="#ffffff" intensity="0.8"></a-light>
      <a-light type="directional" color="#ffffff" intensity="0.5" position="0 5 5"></a-light>

      <!-- Face Tracker & Crown -->
      <a-entity mindar-face-target="anchorIndex: 10">
        <!-- REMEMBER TO PUT YOUR CROWN LINK HERE! -->
        <a-gltf-model rotation="0 0 0" position="0 0.2 0" scale="0.1 0.1 0.1" src="#crownModel"></a-gltf-model>
      </a-entity>

      <a-assets>
        <!-- REMEMBER TO PUT YOUR CROWN LINK HERE! -->
        <a-asset-item id="crownModel" src="YOUR_CROWN_LINK_HERE.glb"></a-asset-item>
      </a-assets>
    </a-scene>

    <!-- Script for the flash effect -->
    <script>
      function triggerFlash() {
        const flash = document.getElementById('flash');
        flash.style.transition = 'none'; // reset transition
        flash.style.opacity = '1';       // make it fully white instantly
        
        // fade out slowly
        setTimeout(() => {
          flash.style.transition = 'opacity 0.8s ease-out';
          flash.style.opacity = '0';
        }, 50);
      }
    </script>
  </body>
</html>
